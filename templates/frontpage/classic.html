<!DOCTYPE html>
<!--
  Papertek Frontpage Template: classic
  Best for: Language courses with multiple curriculum levels
  Features: Curriculum selector, vocab trainer link, tools section
-->
<html lang="{{UI_LANG}}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{COURSE_NAME}}</title>
  <link rel="stylesheet" href="papertek.css" />
  <link rel="stylesheet" href="stylesheet.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="ikoner/icon-192x192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="{{COURSE_NAME}}" />
</head>
<body class="bg-neutral-50 text-neutral-800">
  <div class="container mx-auto p-4 sm:p-6 md:p-8">
    <!-- AppShell renders header, curriculum selector, lesson list, and tools here -->
    <div id="page-header-placeholder"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
